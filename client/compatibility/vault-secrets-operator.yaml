nodes:
  - name: vault-secrets-operator
    docUrl: https://developer.hashicorp.com/vault/docs/deploy/kubernetes/vso
    kubernetesResource:
      - name: vault-secrets-operator
        namespace: vault-secrets-operator
        type: deployment
        labels:
          app.kubernetes.io/name: vault-secrets-operator
        image: vault-secrets-operator

edges:
  # VSO Vault 1.21.x
  - source: vault-secrets-operator
    sourceVersion: "1.21"
    destination: Kubernetes
    versionRange: ">=1.31, <=1.35"
    compatible: true
  - source: vault-secrets-operator
    sourceVersion: "1.21"
    destination: Kubernetes
    versionRange: "<1.31"
    compatible: false
    reason: "Vault Secrets Operator 1.21.x requires Kubernetes 1.31 or higher"

  # VSO Vault 1.20.x
  - source: vault-secrets-operator
    sourceVersion: "1.20"
    destination: Kubernetes
    versionRange: ">=1.31, <=1.35"
    compatible: true
  - source: vault-secrets-operator
    sourceVersion: "1.20"
    destination: Kubernetes
    versionRange: "<1.31"
    compatible: false
    reason: "Vault Secrets Operator 1.20.x requires Kubernetes 1.31 or higher"

  # VSO Vault 1.19.x
  - source: vault-secrets-operator
    sourceVersion: "1.19"
    destination: Kubernetes
    versionRange: ">=1.31, <=1.35"
    compatible: true
  - source: vault-secrets-operator
    sourceVersion: "1.19"
    destination: Kubernetes
    versionRange: "<1.31"
    compatible: false
    reason: "Vault Secrets Operator 1.19.x requires Kubernetes 1.31 or higher"
